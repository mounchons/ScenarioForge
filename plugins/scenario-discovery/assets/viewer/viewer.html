<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ScenarioForge — scenarios.json</title>
<style>
  :root {
    --bg: #f4f6fb; --panel: #ffffff; --ink: #1c2331; --muted: #6b7688;
    --line: #e2e7f0; --brand: #3b5bdb; --brand-ink: #ffffff;
    --ok: #2f9e44; --ok-bg: #e6f4ea; --danger: #e03131; --danger-bg: #fdecec;
    --warn: #f08c00; --warn-bg: #fff4e2; --chip: #eef1f7;
    --radius: 10px; --shadow: 0 1px 3px rgba(20,30,60,.08), 0 1px 2px rgba(20,30,60,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12151c; --panel: #1a1f2b; --ink: #e6eaf2; --muted: #9aa5b8;
      --line: #2a3140; --brand: #5c7cfa; --chip: #232a37;
      --ok: #51cf66; --ok-bg: #17351f; --danger: #ff6b6b; --danger-bg: #3a1a1a;
      --warn: #ffa94d; --warn-bg: #3a2a12;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Segoe UI", "Sarabun", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 20px 18px 60px; }

  #sf-meta { display: flex; flex-direction: column; gap: 6px; padding: 18px 20px;
    background: var(--brand); color: var(--brand-ink); border-radius: var(--radius); box-shadow: var(--shadow); }
  #sf-meta .brand { font-weight: 700; letter-spacing: .3px; font-size: 15px; opacity: .9; }
  #sf-meta .meta-line { display: flex; flex-wrap: wrap; gap: 6px 22px; align-items: center; }
  #sf-meta .meta-item { display: inline-flex; align-items: center; gap: 6px; font-size: 15px; }
  #sf-meta .k { opacity: .8; font-size: 12.5px; }

  #sf-rollup { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px; margin: 16px 0; }
  .tile { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 4px;
    justify-content: center; }
  .tile.wide { grid-column: span 2; }
  .tile-n { font-size: 26px; font-weight: 700; line-height: 1; }
  .tile-n.danger { color: var(--danger); }
  .tile-n.warn { color: var(--warn); }
  .tile-l { font-size: 12.5px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--chip); border-radius: 20px; padding: 3px 10px; font-size: 12.5px; }
  .pill { display: inline-block; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 13.5px; }
  .pill.ok { background: var(--ok-bg); color: var(--ok); }
  .pill.no { background: var(--danger-bg); color: var(--danger); }

  #sf-filters { display: flex; flex-wrap: wrap; gap: 10px 16px; align-items: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
  #sf-filters label { font-size: 13.5px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  #sf-search { flex: 1 1 240px; min-width: 200px; padding: 8px 12px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--bg); color: var(--ink); font-size: 14px; }
  #sf-filters select { padding: 6px 8px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg); color: var(--ink); font-size: 13.5px; }

  #sf-error { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 14px;
    background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); font-size: 14px; }
  #sf-error button { margin-left: 10px; }

  details.scenario { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  details.scenario > summary { cursor: pointer; padding: 14px 16px; list-style: none;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; }
  details.scenario > summary::-webkit-details-marker { display: none; }
  details.scenario > summary::before { content: "▸"; color: var(--muted); transition: transform .15s; }
  details.scenario[open] > summary::before { transform: rotate(90deg); }
  .sid { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 12.5px;
    color: var(--brand); font-weight: 600; }
  .stitle { font-weight: 600; flex: 1 1 auto; }
  .badges { display: inline-flex; flex-wrap: wrap; gap: 5px; }
  .scenario-body { padding: 0 16px 12px; }

  details.section { border-top: 1px solid var(--line); }
  details.section > summary { cursor: pointer; padding: 10px 2px; font-weight: 600; font-size: 14px;
    list-style: none; color: var(--ink); }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary::before { content: "＋"; color: var(--muted); margin-right: 8px; font-size: 12px; }
  details.section[open] > summary::before { content: "－"; }
  .section-body { padding: 2px 0 12px 18px; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 6px; font-size: 11.5px; font-weight: 600;
    background: var(--chip); color: var(--ink); white-space: nowrap; }
  .badge.prio-high { background: var(--danger-bg); color: var(--danger); }
  .badge.prio-medium { background: var(--warn-bg); color: var(--warn); }
  .badge.prio-low { background: var(--chip); color: var(--muted); }
  .badge.st-validated, .badge.st-locked { background: var(--ok-bg); color: var(--ok); }
  .badge.st-needs_review { background: var(--warn-bg); color: var(--warn); }
  .badge.sev-high { background: var(--danger-bg); color: var(--danger); }
  .badge.sev-medium { background: var(--warn-bg); color: var(--warn); }
  .badge.comp { background: var(--chip); color: var(--muted); font-family: ui-monospace, monospace; }

  .row { display: grid; grid-template-columns: 160px 1fr; gap: 4px 14px; padding: 4px 0;
    border-bottom: 1px dashed var(--line); }
  .row:last-child { border-bottom: none; }
  .rk { color: var(--muted); font-size: 13px; }
  .rv { font-size: 14px; }
  .rv ul { margin: 2px 0; padding-left: 18px; }
  .muted { color: var(--muted); font-size: 13.5px; }
  h4 { margin: 14px 0 6px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }

  .gap, .suggestion { padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px; margin: 6px 0;
    background: var(--bg); }
  .gap .detail, .suggestion .detail { margin: 4px 0; font-size: 14px; }
  .gap .by, .suggestion .by { font-size: 12px; color: var(--muted); }
  .resolution { margin-top: 6px; font-size: 13.5px; padding: 6px 10px; background: var(--ok-bg);
    color: var(--ok); border-radius: 6px; }
  .decide { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }
  .decide input { flex: 1 1 200px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 7px;
    background: var(--panel); color: var(--ink); font-size: 13.5px; }
  .btn { border: none; border-radius: 7px; padding: 7px 16px; font-weight: 600; font-size: 13.5px; cursor: pointer; }
  .btn.ok { background: var(--ok); color: #fff; }
  .btn.no { background: var(--danger); color: #fff; }
  #sf-error button { border: none; border-radius: 7px; padding: 5px 14px; font-weight: 600; cursor: pointer;
    background: var(--warn); color: #fff; }

  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th, .tbl td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--line); }
  .tbl th { color: var(--muted); font-weight: 600; }
  .hv { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }

  @media print {
    body { background: #fff; }
    #sf-filters, .decide, button, #sf-error button { display: none !important; }
    .tile, details.scenario { box-shadow: none; }
    details.scenario, .gap, .suggestion { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header id="sf-meta"></header>
  <section id="sf-rollup"></section>
  <section id="sf-filters">
    <input id="sf-search" type="search" placeholder="ค้นหา id / ชื่อ / actor / goal" aria-label="ค้นหา" />
    <label>สถานะ
      <select id="sf-filter-status">
        <option value="">ทั้งหมด</option>
        <option value="draft">draft</option>
        <option value="needs_review">needs_review</option>
        <option value="validated">validated</option>
        <option value="locked">locked</option>
      </select>
    </label>
    <label>ความสำคัญ
      <select id="sf-filter-priority">
        <option value="">ทั้งหมด</option>
        <option value="high">high</option>
        <option value="medium">medium</option>
        <option value="low">low</option>
      </select>
    </label>
    <label><input type="checkbox" id="sf-filter-gaps" /> มี gap</label>
    <label><input type="checkbox" id="sf-filter-sugs" /> มีข้อเสนอค้าง</label>
  </section>
  <div id="sf-error" hidden></div>
  <main id="sf-cards"></main>
</div>

<script id="sf-data" type="application/json"></script>

<script>
  // ---- Core render layer (shared by live and snapshot; contains NO network code) ----
  var state = { doc: null, live: false };
  var meta, rollup, cards, err;
  var fSearch, fStatus, fPriority, fGaps, fSugs;
  var errorKind = null;
  var printSaved = null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return String(iso);
      return new Intl.DateTimeFormat('th-TH', { dateStyle: 'medium', timeStyle: 'short' }).format(d);
    } catch (e) { return String(iso); }
  }
  function pct(score) { return score == null ? '—' : Math.round(score * 100) + '%'; }
  function rank(sev) { return sev === 'high' ? 0 : sev === 'medium' ? 1 : sev === 'low' ? 2 : 3; }
  function row(k, v) { return '<div class="row"><span class="rk">' + esc(k) + '</span><span class="rv">' + v + '</span></div>'; }
  function ulist(arr) {
    if (!arr || !arr.length) return '—';
    return '<ul>' + arr.map(function (x) { return '<li>' + esc(String(x)) + '</li>'; }).join('') + '</ul>';
  }
  function badgePrio(p) { p = p || '—'; return '<span class="badge prio-' + esc(p) + '">' + esc(p) + '</span>'; }
  function badgeStatus(s) { s = s || '—'; return '<span class="badge st-' + esc(s) + '">' + esc(s) + '</span>'; }
  function badgeSev(s) { s = s || '—'; return '<span class="badge sev-' + esc(s) + '">' + esc(s) + '</span>'; }
  function badgeKind(k) { k = k || '—'; return '<span class="badge kind">' + esc(k) + '</span>'; }

  function showError(html, kind) { err.innerHTML = html; err.hidden = false; errorKind = kind || 'msg'; }
  function clearError() { err.hidden = true; err.innerHTML = ''; errorKind = null; }

  function render(doc, opts) { state.doc = doc; state.live = !!(opts && opts.live); draw(); }
  function draw() {
    if (!state.doc) return;
    renderMeta(state.doc);
    renderRollup(state.doc);
    renderCards(state.doc, state.live);
    schemaCheck(state.doc);
  }

  function schemaCheck(doc) {
    var v = doc && doc.meta && doc.meta.schema_version;
    if (v && String(v).indexOf('1.') !== 0) {
      showError('เอกสารนี้ใช้ schema เวอร์ชัน ' + esc(v) + ' ซึ่ง viewer ยังไม่รู้จัก — การแสดงผลอาจไม่ครบถ้วน', 'schema');
    } else if (errorKind === 'schema') {
      clearError();
    }
  }

  function renderMeta(doc) {
    var m = doc.meta || {};
    meta.innerHTML =
      '<div class="brand">ScenarioForge</div>' +
      '<div class="meta-line">' +
        '<span class="meta-item"><span class="k">โมดูล</span> <b>' + esc(m.module || '—') + '</b></span>' +
        '<span class="meta-item"><span class="k">สถานะ</span> <b>' + esc(m.status || '—') + '</b></span>' +
        '<span class="meta-item"><span class="k">ระดับงาน</span> <b>' + esc(m.effort_scale || '—') + '</b></span>' +
        '<span class="meta-item"><span class="k">สร้างเมื่อ</span> ' + esc(fmtDate(m.generated_at)) + '</span>' +
      '</div>';
  }

  function renderRollup(doc) {
    var r = doc.rollup || {};
    var chips = Object.keys(r.by_status || {}).map(function (k) {
      return '<span class="chip">' + esc(k) + ': ' + esc(String(r.by_status[k])) + '</span>';
    }).join('');
    var ready = !!r.ready_for_next_phase;
    rollup.innerHTML =
      '<div class="tile"><div class="tile-n">' + esc(String(r.total == null ? 0 : r.total)) + '</div><div class="tile-l">ทั้งหมด</div></div>' +
      '<div class="tile wide"><div class="chips">' + (chips || '—') + '</div><div class="tile-l">แยกตามสถานะ</div></div>' +
      '<div class="tile"><div class="tile-n">' + pct(r.avg_completeness == null ? null : r.avg_completeness) + '</div><div class="tile-l">คะแนนความครบถ้วนเฉลี่ย</div></div>' +
      '<div class="tile"><div class="tile-n ' + (r.open_gaps_high > 0 ? 'danger' : '') + '">' + esc(String(r.open_gaps_high == null ? 0 : r.open_gaps_high)) + '</div><div class="tile-l">gap ร้ายแรงค้าง</div></div>' +
      '<div class="tile"><div class="tile-n ' + (r.pending_suggestions > 0 ? 'warn' : '') + '">' + esc(String(r.pending_suggestions == null ? 0 : r.pending_suggestions)) + '</div><div class="tile-l">ข้อเสนอค้างตัดสิน</div></div>' +
      '<div class="tile"><span class="pill ' + (ready ? 'ok' : 'no') + '">' + (ready ? 'พร้อมเข้าเฟสถัดไป' : 'ยังไม่พร้อม') + '</span></div>';
  }

  function passesFilter(s) {
    var q = fSearch.value.trim().toLowerCase();
    if (q) {
      var b = s.business || {};
      var hay = [s.id, s.title, b.actor, b.goal].filter(Boolean).join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    if (fStatus.value && s.status !== fStatus.value) return false;
    if (fPriority.value && (s.business || {}).priority !== fPriority.value) return false;
    if (fGaps.checked && !(((s.analysis || {}).completeness || {}).gaps || []).length) return false;
    if (fSugs.checked && !((s.analysis || {}).suggestions || []).some(function (x) { return x.status === 'pending'; })) return false;
    return true;
  }

  function captureOpen() {
    var set = {};
    cards.querySelectorAll('details[data-key]').forEach(function (d) { if (d.open) set[d.dataset.key] = 1; });
    return set;
  }
  function applyOpen(set) {
    cards.querySelectorAll('details[data-key]').forEach(function (d) { if (set[d.dataset.key]) d.open = true; });
  }

  function renderCards(doc, live) {
    var open = captureOpen();
    var list = (doc.scenarios || []).filter(passesFilter);
    cards.innerHTML = list.length
      ? list.map(function (s) { return scenarioCard(s, live); }).join('')
      : '<p class="empty">ไม่มี scenario ที่ตรงกับตัวกรอง</p>';
    applyOpen(open);
  }

  function sectionDetails(sid, key, title, inner) {
    return '<details class="section" data-key="' + esc(sid) + '/' + esc(key) + '"><summary>' + esc(title) +
      '</summary><div class="section-body">' + inner + '</div></details>';
  }

  function secBusiness(s) {
    var b = s.business || {};
    return sectionDetails(s.id, 'business', 'ข้อมูลธุรกิจ',
      row('ผู้กระทำ (actor)', esc(b.actor || '—')) +
      row('เป้าหมาย (goal)', esc(b.goal || '—')) +
      row('ตัวกระตุ้น (trigger)', esc(b.trigger || '—')) +
      row('เงื่อนไขก่อน', ulist(b.preconditions)) +
      row('เงื่อนไขหลัง', ulist(b.postconditions)) +
      row('คุณค่าทางธุรกิจ', esc(b.business_value || '—')) +
      row('ความสำคัญ', badgePrio(b.priority)) +
      row('มีหน้าจอ', b.has_ui ? '🖥️ มี UI' : '⚙️ batch/API') +
      row('โดเมน', ulist(b.domain_concepts)));
  }

  function secTraces(s) {
    var t = s.traces_down || {};
    var keys = ['user_stories', 'use_cases', 'acceptance_criteria', 'entities', 'pages', 'apis', 'features', 'test_scenarios'];
    var rows = keys.filter(function (k) { return (t[k] || []).length; })
      .map(function (k) { return row(k, ulist(t[k])); }).join('');
    return sectionDetails(s.id, 'traces_down', 'การเชื่อมโยงเฟสถัดไป',
      rows || '<p class="muted">ยังไม่มีการเชื่อมโยงจากเฟสถัดไป</p>');
  }

  function suggestionHtml(sid, sg, live) {
    var p = sg.proposed || {};
    var res = sg.resolution;
    var resHtml = res
      ? '<div class="resolution">มติ: ' + esc(res.note || '') + ' <span class="muted">— ' + esc(res.by || '') + ' ' + esc(fmtDate(res.at)) + '</span></div>'
      : '';
    var controls = '';
    if (live && sg.status === 'pending') {
      controls =
        '<div class="decide">' +
          '<input type="text" data-note placeholder="เหตุผล/บันทึก (ไม่บังคับ)" />' +
          '<button type="button" class="btn ok" data-action="decide" data-scenario="' + esc(sid) + '" data-suggestion="' + esc(sg.id) + '" data-status="accepted">ยอมรับ</button>' +
          '<button type="button" class="btn no" data-action="decide" data-scenario="' + esc(sid) + '" data-suggestion="' + esc(sg.id) + '" data-status="rejected">ปฏิเสธ</button>' +
        '</div>';
    }
    return '<div class="suggestion">' +
      '<div class="sug-head">' + badgeKind(sg.kind) + ' ' + badgeStatus(sg.status) + ' <b>' + esc(p.title || '') + '</b></div>' +
      (p.rationale ? '<div class="detail">' + esc(p.rationale) + '</div>' : '') +
      '<div class="by">โดย ' + esc(sg.raised_by || '') + '</div>' +
      resHtml + controls +
      '</div>';
  }

  function secAnalysis(s, live) {
    var a = s.analysis || {};
    var c = a.completeness || {};
    var gaps = (c.gaps || []).slice().sort(function (x, y) { return rank(x.severity) - rank(y.severity); });
    var gapHtml = gaps.length
      ? gaps.map(function (g) {
          return '<div class="gap">' + badgeSev(g.severity) + ' <b>' + esc(g.type || '') + '</b>' +
            '<div class="detail">' + esc(g.detail || '') + '</div>' +
            '<div class="by">โดย ' + esc(g.raised_by || '') + '</div></div>';
        }).join('')
      : '<p class="muted">ไม่มี gap</p>';
    var sugHtml = (a.suggestions || []).length
      ? (a.suggestions || []).map(function (sg) { return suggestionHtml(s.id, sg, live); }).join('')
      : '<p class="muted">ไม่มีข้อเสนอ</p>';
    var comp = pct(c.score == null ? null : c.score);
    return sectionDetails(s.id, 'analysis', 'ผลวิเคราะห์',
      row('คะแนนความครบถ้วน', comp + (c.scored_by ? ' <span class="muted">(' + esc(c.scored_by) + ')</span>' : '')) +
      '<h4>Gaps</h4>' + gapHtml +
      '<h4>ข้อเสนอ (suggestions)</h4>' + sugHtml);
  }

  function secContributors(s) {
    var list = ((s.analysis || {}).contributors) || [];
    var rows = list.map(function (c) {
      return '<tr><td>' + esc(c.agent || '') + '</td><td>' + esc(c.role || '') + '</td><td>' +
        esc(c.provider_model || '—') + '</td><td>' + esc(fmtDate(c.ran_at)) + '</td><td>' + esc(c.verdict || '') + '</td></tr>';
    }).join('');
    var table = rows
      ? '<table class="tbl"><thead><tr><th>agent</th><th>role</th><th>provider_model</th><th>ran_at</th><th>verdict</th></tr></thead><tbody>' + rows + '</tbody></table>'
      : '<p class="muted">—</p>';
    return sectionDetails(s.id, 'contributors', 'ผู้ร่วมวิเคราะห์', table);
  }

  function secProvenance(s, live) {
    var p = s.provenance || {};
    var hv = live
      ? '<label class="hv"><input type="checkbox" data-action="validate" data-scenario="' + esc(s.id) + '" ' + (p.human_validated ? 'checked' : '') + ' /> ยืนยันโดยมนุษย์</label>'
      : 'ยืนยันโดยมนุษย์: ' + (p.human_validated ? '✓' : '✗');
    return sectionDetails(s.id, 'provenance', 'ที่มา',
      row('แหล่งที่มา', esc(p.source || '—')) +
      row('ความเชื่อมั่น', esc(String(p.confidence == null ? '—' : p.confidence))) +
      row('การยืนยัน', hv));
  }

  function scenarioCard(s, live) {
    var b = s.business || {};
    var comp = ((s.analysis || {}).completeness || {}).score;
    var badges =
      badgePrio(b.priority) + ' ' + badgeStatus(s.status) + ' ' +
      '<span class="badge comp">' + pct(comp == null ? null : comp) + '</span> ' +
      '<span class="badge ui">' + (b.has_ui ? '🖥️ UI' : '⚙️ batch') + '</span>';
    return '<details class="scenario" data-key="' + esc(s.id) + '">' +
      '<summary><span class="sid">' + esc(s.id) + '</span> <span class="stitle">' + esc(s.title || '') + '</span> <span class="badges">' + badges + '</span></summary>' +
      '<div class="scenario-body">' +
        secBusiness(s) + secTraces(s) + secAnalysis(s, live) + secContributors(s) + secProvenance(s, live) +
      '</div></details>';
  }

  function wireFilters() {
    [fSearch, fStatus, fPriority, fGaps, fSugs].forEach(function (elm) {
      var handler = function () { if (state.doc) renderCards(state.doc, state.live); };
      elm.addEventListener('input', handler);
      elm.addEventListener('change', handler);
    });
  }

  function wireDelegation() {
    cards.addEventListener('click', function (e) {
      var btn = e.target.closest && e.target.closest('button[data-action="decide"]');
      if (!btn || !window.SF_LIVE) return;
      var sug = btn.closest('.suggestion');
      var note = sug ? sug.querySelector('input[data-note]') : null;
      window.SF_LIVE.postAction('suggestion_decision', {
        scenario_id: btn.dataset.scenario,
        suggestion_id: btn.dataset.suggestion,
        status: btn.dataset.status,
        resolution: note ? note.value : ''
      });
    });
    cards.addEventListener('change', function (e) {
      var cb = e.target.closest && e.target.closest('input[data-action="validate"]');
      if (!cb || !window.SF_LIVE) return;
      window.SF_LIVE.postAction('set_human_validated', {
        scenario_id: cb.dataset.scenario,
        value: cb.checked
      });
    });
  }

  function wirePrint() {
    window.addEventListener('beforeprint', function () {
      printSaved = captureOpen();
      cards.querySelectorAll('details[data-key]').forEach(function (d) { d.open = true; });
    });
    window.addEventListener('afterprint', function () {
      if (!printSaved) return;
      cards.querySelectorAll('details[data-key]').forEach(function (d) { d.open = !!printSaved[d.dataset.key]; });
      printSaved = null;
    });
  }

  function boot() {
    meta = document.getElementById('sf-meta');
    rollup = document.getElementById('sf-rollup');
    cards = document.getElementById('sf-cards');
    err = document.getElementById('sf-error');
    fSearch = document.getElementById('sf-search');
    fStatus = document.getElementById('sf-filter-status');
    fPriority = document.getElementById('sf-filter-priority');
    fGaps = document.getElementById('sf-filter-gaps');
    fSugs = document.getElementById('sf-filter-sugs');
    wireFilters();
    wireDelegation();
    wirePrint();

    var raw = document.getElementById('sf-data').textContent.trim();
    if (raw) {
      document.body.classList.add('snapshot');
      try { render(JSON.parse(raw), { live: false }); }
      catch (e) { showError('ข้อมูล snapshot เสียหาย: ' + esc(e.message), 'msg'); }
    } else if (window.SF_LIVE) {
      window.SF_LIVE.start();
    }
  }
  document.addEventListener('DOMContentLoaded', boot);
</script>

<!--LIVE-ONLY-START-->
<script>
  // Network layer — present only in the live server-served file. The snapshot
  // export strips this entire block, leaving a read-only document by construction.
  (function () {
    var lastMtime = null;

    function loadOnce() {
      return fetch('/api/scenarios').then(function (res) {
        return res.json().catch(function () { return null; }).then(function (body) {
          if (res.status === 404) { showError('ไม่พบไฟล์ scenarios.json — แนะนำให้รัน scenario-discovery ก่อน', 'msg'); return; }
          if (res.status === 422) { showError('ไฟล์ scenarios.json อ่านไม่ได้: ' + esc((body && body.error) || ''), 'msg'); return; }
          if (res.ok && body) { lastMtime = body.mtimeMs; clearError(); render(body.data, { live: true }); }
        });
      }).catch(function () { showError('เชื่อมต่อ server ไม่ได้', 'msg'); });
    }

    function showConflict() {
      showError('ไฟล์ถูกแก้ไขระหว่างทาง — กดรีเฟรชเพื่อโหลดข้อมูลล่าสุด <button type="button" id="sf-refresh">รีเฟรช</button>', 'conflict');
      var b = document.getElementById('sf-refresh');
      if (b) b.addEventListener('click', function () { clearError(); loadOnce(); });
    }

    function postAction(type, payload) {
      return fetch('/api/action', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ type: type, mtimeMs: lastMtime, payload: payload })
      }).then(function (res) {
        return res.json().catch(function () { return null; }).then(function (body) {
          if (res.status === 409) { showConflict(); return; }
          if (res.ok && body) { lastMtime = body.mtimeMs; clearError(); render(body.data, { live: true }); return; }
          showError('ทำรายการไม่สำเร็จ: ' + esc((body && body.error) || res.status), 'msg');
        });
      }).catch(function () { showError('เชื่อมต่อ server ไม่ได้', 'msg'); });
    }

    function start() {
      loadOnce();
      setInterval(function () {
        fetch('/api/scenarios').then(function (res) {
          if (!res.ok) return null;
          return res.json();
        }).then(function (body) {
          if (body && body.mtimeMs !== lastMtime) { lastMtime = body.mtimeMs; clearError(); render(body.data, { live: true }); }
        }).catch(function () {});
      }, 2000);
      // The 2s poll is throttled while the tab is hidden (browsers clamp timers in
      // background tabs). Refresh immediately when the tab regains visibility so an
      // author who tabbed away sees the agent's edits as soon as they return.
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) loadOnce();
      });
    }

    window.SF_LIVE = { start: start, postAction: postAction, reload: loadOnce };
  })();
</script>
<!--LIVE-ONLY-END-->
